# CI workflow for Flynn
#
# Builds all components and runs unit tests on every push and pull request
# to the tuf-rebuild branch. Uses a Debian container with Go 1.22.12 and
# all required system dependencies.
#
# The build uses script/bootstrap-build which compiles all 34 Flynn binaries
# from source without requiring a running Flynn cluster.

name: CI

on:
  push:
    branches: [tuf-rebuild, master, go-1.22-upgrade, debian13-cgroups-v2-bootstrap]
  pull_request:
    branches: [tuf-rebuild, master, debian13-cgroups-v2-bootstrap]
  workflow_dispatch:

jobs:
  build:
    name: Build all components
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential \
            gcc \
            libseccomp-dev \
            git \
            python3 \
            curl \
            ca-certificates

      - name: Install Go 1.22.12
        run: |
          curl -fsSL "https://go.dev/dl/go1.22.12.linux-amd64.tar.gz" \
            | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          echo "GOPATH=/go" >> $GITHUB_ENV
          echo "/go/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all components
        run: script/bootstrap-build --version "ci-$(echo "$GITHUB_SHA" | cut -c1-8)"

      - name: Verify binaries
        run: |
          echo "Built binaries:"
          ls -la build/bin/
          echo ""
          echo "Binary count: $(ls -1 build/bin/ | grep -v '.gz$' | grep -v '^flynn$' | wc -l)"
          echo ""
          echo "flynn-host version:"
          build/bin/flynn-host version || true

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential \
            gcc \
            libseccomp-dev \
            git \
            python3 \
            curl \
            ca-certificates

      - name: Install Go 1.22.12
        run: |
          curl -fsSL "https://go.dev/dl/go1.22.12.linux-amd64.tar.gz" \
            | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          echo "GOPATH=/go" >> $GITHUB_ENV
          echo "/go/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run standalone unit tests
        run: make test-unit-standalone
